name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Lint, Format, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx biome ci --formatter-enabled=false --assist-enabled=false src tests

      - name: Format
        run: bunx biome ci --linter-enabled=false --assist-enabled=false src tests

      - name: Test
        run: bun test
