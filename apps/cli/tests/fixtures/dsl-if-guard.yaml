document:
  dsl: "1.0.3"
  namespace: example
  name: dsl-if-guard
  version: "0.1.0"
do:
  - skipped:
      if: "${ false }"
      set: { unreachable: true }
  - kept:
      if: "${ true }"
      set: { reached: true }
  - per_item:
      for:
        each: n
        in: "${ [1, 2, 3, 4] }"
      do:
        - even_only:
            if: "${ (.var.n % 2) == 0 }"
            set:
              latest_even: "${ .var.n }"
